<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Meet</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="background-animation"></div>
  
  <main class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <svg fill="currentColor" viewBox="0 0 24 24" class="logo-icon"><path d="M20,15.5C18.8,15.5 17.5,15.3 16.4,14.9C16.3,14.9 16.2,14.9 16.1,14.9C15.8,14.9 15.6,15 15.4,15.2L13.2,17.4C10.4,15.9 8,13.6 6.6,10.8L8.8,8.6C9.1,8.3 9.2,7.9 9,7.6C8.7,6.5 8.5,5.2 8.5,4C8.5,3.5 8,3 7.5,3H4C3.5,3 3,3.5 3,4C3,13.4 10.6,21 20,21C20.5,21 21,20.5 21,20V16.5C21,16 20.5,15.5 20,15.5M5,5H6.5C6.6,5.9 6.8,6.8 7,7.6L5.8,8.8C5.4,7.6 5.1,6.3 5,5M19,19C17.7,18.9 16.4,18.6 15.2,18.2L16.4,17C17.2,17.2 18.1,17.4 19,17.5V19Z" /></svg>
        Nexus Meet
      </div>
      <div class="user-info">
        <span class="status-dot"></span>
        <span class="my-number-container">My Number: <strong id="my-number">------</strong></span>
      </div>
    </header>

    <!-- Dashboard Screen -->
    <section id="dashboard-screen" class="screen full-height active">
      <div class="dashboard-card glass-panel">
        <h2 class="title">Video Conferencing</h2>
        <p class="subtitle">Premium meetings for everyone. Free and secure.</p>
        
        <div class="actions dashboard-actions">
          <button class="btn-primary pulse-animation" id="btn-host-meeting">
            <svg viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            Host a Meeting
          </button>
        </div>

        <div class="join-action" style="margin-top: 32px;">
           <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">or join an existing meeting</p>
           <div style="display: flex; gap: 8px; justify-content: center; max-width: 300px; margin: 0 auto;">
             <input type="text" id="room-code-input" placeholder="Room Code" style="flex: 1; background: #000; border: 1px solid #333; border-radius: 6px; padding: 10px; color: white; outline: none; text-align: center; font-family: monospace;">
             <button class="btn-primary small" id="btn-join-meeting" style="background: transparent; color: white;">Join</button>
           </div>
        </div>
      </div>
    </section>

    <!-- Room Screen -->
    <section id="room-screen" class="screen full-height">
      <!-- Video Grid -->
      <div id="video-grid" class="video-grid">
        <!-- Self Video Element -->
        <div class="video-wrapper glass-panel" id="wrapper-local">
          <video id="local-video" autoplay playsinline muted></video>
          <div class="video-label">Me (<span id="local-number-label"></span>)</div>
        </div>
      </div>
      
      <!-- Bottom Controls -->
      <div class="controls-bar glass-panel">
        <div class="room-info">Room: <strong id="current-room-id"></strong></div>
        
        <div class="media-controls">
          <button class="btn btn-control" id="btn-mute" title="Toggle Audio">
            <svg class="icon-mic-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            <svg class="icon-mic-off hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
          </button>
          
          <button class="btn btn-control" id="btn-video" title="Toggle Video">
            <svg class="icon-vid-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            <svg class="icon-vid-off hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </button>

          <button class="btn btn-control" id="btn-screen-share" title="Share Screen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
          </button>
          
          <button class="btn btn-decline" id="btn-leave" title="Leave Meeting">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
          </button>
        </div>

        <div class="invite-box">
          <button class="btn-primary small" id="btn-open-invite">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
            Invite User
          </button>
        </div>
      </div>
    </section>

    <!-- Invite Modal -->
    <div id="invite-modal" class="modal-overlay hidden">
      <div class="modal-content glass-panel">
        <h3>Invite someone</h3>
        <p>Enter their 6-digit number to notify them</p>
        <div class="input-display" style="margin-top: 16px;">
          <input type="text" id="invite-number" placeholder="Enter Number" maxlength="6">
        </div>
        <div class="modal-actions" style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end;">
          <button class="btn-cancel" id="btn-cancel-invite">Cancel</button>
          <button class="btn-primary" id="btn-send-invite">Send Invite</button>
        </div>
      </div>
    </div>

    <!-- Incoming Invite Overlay -->
    <div id="incoming-invite-overlay" class="modal-overlay hidden">
      <div class="modal-content glass-panel ringing-card">
        <div class="avatar-ring pulse-animation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <h2 class="title">Meeting Invite</h2>
        <p class="subtitle"><strong id="inviter-number">------</strong> invited you to join their meeting.</p>
        <div class="actions">
          <button class="btn btn-decline" id="btn-reject-invite">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
          <button class="btn btn-accept" id="btn-accept-invite">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Error/Notification Toast -->
    <div id="toast" class="toast hidden"></div>
  </main>
</body>
</html>
